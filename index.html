<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>PCCOE Virtual Lab | Matrix Rank Solver + Quiz</title>
  <!-- FontAwesome 6 (free CDN) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <!-- Chart.js CDN for accuracy graph -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    }

    body {
      background: #f0f2f5;
      height: 100vh;
      overflow: hidden;
    }

    .dashboard {
      display: flex;
      height: 100vh;
      width: 100%;
    }

    /* SIDENAV */
    .sidenav {
      width: 280px;
      background: #003366;
      color: white;
      display: flex;
      flex-direction: column;
      box-shadow: 4px 0 20px rgba(0,0,0,0.08);
      z-index: 10;
    }

    .logo-area {
      padding: 24px 20px 16px 24px;
      border-bottom: 1px solid rgba(255,215,0,0.3);
      display: flex;
      align-items: center;
      gap: 14px;
      flex-wrap: wrap;
    }

    .college-logo {
      width: 52px;
      height: 52px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 8px rgba(0,0,0,0.2);
      overflow: hidden;
    }

    .college-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .logo-text h3 {
      font-size: 1rem;
      font-weight: 600;
      line-height: 1.2;
    }

    .logo-text p {
      font-size: 0.7rem;
      color: #FFC107;
    }

    .nav-items {
      flex: 1;
      padding: 20px 16px;
    }

    .nav-btn {
      width: 100%;
      background: transparent;
      border: none;
      color: #e0e7ff;
      text-align: left;
      padding: 12px 18px;
      margin: 6px 0;
      font-size: 1rem;
      font-weight: 500;
      border-radius: 40px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .nav-btn i {
      width: 24px;
    }

    .nav-btn.active {
      background: #FFB347;
      color: #003366;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
    }

    .nav-btn:hover:not(.active) {
      background: rgba(255,180,70,0.2);
      color: white;
    }

    /* MAIN CONTENT */
    .main-content {
      flex: 1;
      overflow-y: auto;
      padding: 28px 36px;
      background: #f8fafc;
    }

    .page-header {
      margin-bottom: 28px;
      border-left: 6px solid #FFB347;
      padding-left: 20px;
    }

    .page-header h1 {
      font-size: 1.8rem;
      color: #003366;
    }

    .section-card {
      background: white;
      border-radius: 28px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.03);
      padding: 28px 32px;
      margin-bottom: 30px;
    }

    .section-title {
      font-size: 1.6rem;
      font-weight: 600;
      color: #003366;
      margin-bottom: 20px;
      border-bottom: 2px solid #FFB347;
      display: inline-block;
      padding-bottom: 6px;
    }

    /* Matrix controls */
    .matrix-dim-panel {
      display: flex;
      flex-wrap: wrap;
      align-items: flex-end;
      gap: 20px;
      background: #f1f5f9;
      padding: 20px;
      border-radius: 24px;
      margin-bottom: 28px;
    }

    .dim-control {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .dim-control label {
      font-weight: 600;
      color: #003366;
    }

    .dim-control input {
      width: 90px;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 18px;
      text-align: center;
    }

    button {
      background: #003366;
      border: none;
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: 600;
      color: white;
      cursor: pointer;
      transition: 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    button.calc-btn {
      background: #FF8C42;
      color: #003366;
    }

    .matrix-table {
      border-collapse: collapse;
      background: white;
      margin: 10px 0;
      border-radius: 16px;
      overflow: hidden;
    }

    .matrix-table td, .matrix-table th {
      padding: 12px 16px;
      border: 1px solid #e2e8f0;
      text-align: center;
    }

    .matrix-table td input {
      width: 70px;
      padding: 8px;
      text-align: center;
      border: 1px solid #cbd5e1;
      border-radius: 12px;
    }

    .steps-container {
      max-height: 480px;
      overflow-y: auto;
      background: #fefcf5;
      padding: 12px;
      border-radius: 24px;
      margin-top: 18px;
    }

    .step-item {
      background: white;
      border-left: 6px solid #FFB347;
      margin-bottom: 20px;
      padding: 16px;
      border-radius: 20px;
    }

    .step-op {
      font-weight: 700;
      color: #003366;
      background: #eef2ff;
      display: inline-block;
      padding: 5px 12px;
      border-radius: 30px;
      font-size: 0.8rem;
      margin-bottom: 12px;
    }

    .small-matrix {
      border-collapse: collapse;
    }

    .small-matrix td {
      padding: 8px 12px;
      border: 1px solid #ddd;
      text-align: center;
    }

    .rank-badge {
      background: #003366;
      color: #FFC107;
      display: inline-block;
      padding: 10px 26px;
      border-radius: 40px;
      font-weight: 800;
      margin-top: 20px;
    }

    .app-card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 24px;
      margin-top: 20px;
    }

    .app-card {
      background: linear-gradient(135deg, #fef9e6, #ffffff);
      border-radius: 24px;
      padding: 22px;
      cursor: pointer;
      transition: all 0.3s ease;
      border: 1px solid #ffe0a3;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }

    .app-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 12px 24px rgba(0,51,102,0.15);
      border-color: #FFB347;
    }

    .back-btn {
      background: #e9ecef;
      color: #003366;
      margin-bottom: 20px;
    }

    /* Quiz Styles */
    .quiz-container {
      background: #ffffff;
      border-radius: 28px;
    }

    .quiz-question {
      background: #f9fafc;
      border-radius: 24px;
      padding: 20px;
      margin-bottom: 18px;
      border: 1px solid #e9edf2;
    }

    .quiz-question p {
      font-weight: 700;
      font-size: 1.1rem;
      margin-bottom: 12px;
      color: #003366;
    }

    .quiz-options label {
      display: block;
      margin: 8px 0;
      background: #f1f5f9;
      padding: 10px 16px;
      border-radius: 40px;
      cursor: pointer;
      transition: 0.2s;
    }

    .quiz-options input {
      margin-right: 12px;
    }

    .quiz-stats {
      display: flex;
      gap: 30px;
      flex-wrap: wrap;
      align-items: center;
      margin: 24px 0 20px;
      padding: 20px;
      background: #eef2ff;
      border-radius: 28px;
    }

    .stat-card {
      background: white;
      border-radius: 24px;
      padding: 12px 24px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    canvas#accuracyChart, canvas#preTestChart {
      max-height: 200px;
      max-width: 300px;
    }

    .quiz-actions {
      display: flex;
      gap: 16px;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .feedback-correct {
      color: #2b7e3a;
      font-weight: 600;
      margin-left: 16px;
    }

    .feedback-wrong {
      color: #c7254e;
      font-weight: 600;
    }
    
    /* Feedback form */
    .feedback-form-container {
      background: #ffffff;
      border-radius: 24px;
      padding: 24px;
      margin-top: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      color: #003366;
      margin-bottom: 8px;
    }
    .form-group input, .form-group select, .form-group textarea {
      width: 100%;
      padding: 12px;
      border-radius: 20px;
      border: 1px solid #cbd5e1;
      font-size: 0.95rem;
    }
    .rating-stars {
      display: flex;
      gap: 8px;
      font-size: 1.8rem;
      cursor: pointer;
      color: #ffb347;
    }
    .star-btn {
      background: none;
      border: none;
      font-size: 2rem;
      color: #ccc;
      transition: 0.1s;
      padding: 0;
    }
    .star-btn.active-star {
      color: #FFB347;
    }
    .feedback-message {
      margin-top: 12px;
      font-weight: 500;
    }
    .footer-credit {
      margin-top: 40px;
      text-align: center;
      padding: 20px;
      border-top: 2px solid #e2e8f0;
      color: #2c3e66;
      font-weight: 500;
      background: #ffffffcc;
      border-radius: 40px;
      font-size: 1rem;
    }
    .rank-prediction-panel {
      background: #f1f5f9;
      padding: 20px;
      border-radius: 24px;
      margin-top: 20px;
      margin-bottom: 20px;
    }
    .prediction-feedback {
      margin-top: 12px;
      font-weight: 600;
      padding: 12px;
      border-radius: 28px;
    }
    .tutorial-step {
      background: #f8f9fc;
      border-radius: 20px;
      padding: 20px;
      margin-bottom: 24px;
      border-left: 8px solid #FFB347;
    }
    .demo-matrix {
      background: #fff;
      padding: 16px;
      border-radius: 16px;
      display: inline-block;
      margin: 12px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }
    .highlight {
      background: #fff3e0;
      padding: 12px 20px;
      border-radius: 32px;
      font-weight: 600;
      color: #cc7700;
    }
    @media (max-width: 780px) {
      .sidenav { width: 80px; }
      .logo-text { display: none; }
      .nav-btn span:not(i) { display: none; }
      .nav-btn { justify-content: center; }
    }
  </style>
</head>
<body>
<div class="dashboard">
  <div class="sidenav">
    <div class="logo-area">
      <div class="college-logo">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/00/PCCOE-Logo-24.png" alt="PCCOE Logo" onerror="this.onerror=null; this.src='https://via.placeholder.com/52?text=PCCOE';">
      </div>
      <div class="logo-text">
        <h1>Pimpri Chinchwad College of Engineering (PCCOE)</h1>
        <p>Department of Applied Science & Humanity | Engineering Mathematics Portal</p>
      </div>
    </div>
    <div class="nav-items">
      <button class="nav-btn active" data-section="aim"><i class="fas fa-bullseye"></i> <span>Aim</span></button>
      <button class="nav-btn" data-section="tutorial"><i class="fas fa-chalkboard-teacher"></i> <span>Tutorial</span></button>
      <button class="nav-btn" data-section="pre-test"><i class="fas fa-file-alt"></i> <span>Pre-Test (Basics)</span></button>
      <button class="nav-btn" data-section="virtual-lab"><i class="fas fa-calculator"></i> <span>Virtual Lab</span></button>
      <button class="nav-btn" data-section="applications"><i class="fas fa-chalkboard-user"></i> <span>Applications</span></button>
      <button class="nav-btn" data-section="quiz"><i class="fas fa-question-circle"></i> <span>MCQ Quiz</span></button>
      <button class="nav-btn" data-section="feedback"><i class="fas fa-comment-dots"></i> <span>Feedback</span></button>
      <button class="nav-btn" data-section="credits"><i class="fas fa-trophy"></i> <span>Credits</span></button>
    </div>
    <div style="padding: 24px 20px 30px; font-size: 0.7rem; opacity: 0.7;">
      <i class="fas fa-flask"></i> Dept. of ASH
    </div>
  </div>

  <div class="main-content" id="mainContent"></div>
</div>

<script>
  // ---------- APP STATE ----------
  let currentSection = 'aim';
  let currentSubview = null;
  let selectedApp = null;
  let matrixRows = 3, matrixCols = 3;
  let showStepsHint = false;
  let lastComputedSteps = null;
  let lastRank = null;
  
  // Main Quiz State
  let quizAnswers = {};          
  let quizSubmitted = false;
  let quizStarted = false;
  let quizStartTime = null;
  let quizEndTime = null;
  let quizScore = 0;
  let accuracyChart = null;
  let quizTimerInterval = null;

  // Pre-Test State
  let preTestAnswers = {};
  let preTestSubmitted = false;
  let preTestScore = 0;
  let preTestChart = null;

  const mainContainer = document.getElementById('mainContent');

  // ---------- MATRIX UTILITIES ----------
  function copyMatrix(mat) {
    return mat.map(row => [...row]);
  }

  function gaussianEliminationWithSteps(originalMat) {
    let M = copyMatrix(originalMat);
    const rows = M.length, cols = M[0].length;
    let steps = [];
    steps.push({ operation: "Initial Matrix (Original)", matrix: copyMatrix(M) });
    
    let row = 0, col = 0;
    while (row < rows && col < cols) {
      let pivotRow = -1;
      for (let i = row; i < rows; i++) {
        if (Math.abs(M[i][col]) > 1e-10) { pivotRow = i; break; }
      }
      if (pivotRow === -1) { col++; continue; }
      if (pivotRow !== row) {
        [M[row], M[pivotRow]] = [M[pivotRow], M[row]];
        steps.push({ operation: `Swap R${row+1} ↔ R${pivotRow+1}`, matrix: copyMatrix(M) });
      }
      let pivotVal = M[row][col];
      if (Math.abs(pivotVal) > 1e-12) {
        for (let i = row + 1; i < rows; i++) {
          const factor = M[i][col] / pivotVal;
          if (Math.abs(factor) > 1e-12) {
            let opDesc = `R${i+1} → R${i+1} - (${factor.toFixed(4)}) R${row+1}`;
            for (let k = col; k < cols; k++) {
              M[i][k] = M[i][k] - factor * M[row][k];
              if (Math.abs(M[i][k]) < 1e-10) M[i][k] = 0;
            }
            steps.push({ operation: opDesc, matrix: copyMatrix(M) });
          }
        }
      }
      row++; col++;
    }
    let rank = 0;
    for (let i = 0; i < rows; i++) {
      let nonZero = false;
      for (let j = 0; j < cols; j++) {
        if (Math.abs(M[i][j]) > 1e-9) { nonZero = true; break; }
      }
      if (nonZero) rank++;
    }
    return { finalMatrix: M, rank: rank, steps: steps };
  }

  function generateMatrixInputGrid(rows, cols) {
    let html = `<div class="matrix-grid"><table class="matrix-table" id="dynamicMatrixTable">`;
    for (let i = 0; i < rows; i++) {
      html += `<tr>`;
      for (let j = 0; j < cols; j++) {
        html += `<td><input type="number" step="any" value="0" id="cell_${i}_${j}" style="width:70px;"></td>`;
      }
      html += `</tr>`;
    }
    html += `<\/table></div>`;
    return html;
  }

  function readMatrixFromUI(rows, cols) {
    let mat = [];
    for (let i = 0; i < rows; i++) {
      let row = [];
      for (let j = 0; j < cols; j++) {
        let el = document.getElementById(`cell_${i}_${j}`);
        let val = el ? parseFloat(el.value) : 0;
        if (isNaN(val)) val = 0;
        row.push(val);
      }
      mat.push(row);
    }
    return mat;
  }

  function renderSolutionSteps(steps, rank) {
    if (!steps || steps.length === 0) return `<p>No steps available.</p>`;
    let stepsHtml = `<h4 style="margin-bottom: 12px;"><i class="fas fa-list-ol"></i> Intermediate Row Echelon Steps</h4>`;
    for (let idx = 0; idx < steps.length; idx++) {
      const step = steps[idx];
      const matrix = step.matrix;
      stepsHtml += `<div class="step-item"><div class="step-op"><i class="fas fa-arrows-spin"></i> ${step.operation}</div><div class="step-matrix"><table class="small-matrix">`;
      for (let r = 0; r < matrix.length; r++) {
        stepsHtml += `<tr>`;
        for (let c = 0; c < matrix[0].length; c++) {
          let val = matrix[r][c];
          let displayVal = Number.isInteger(val) ? val : val.toFixed(4);
          stepsHtml += `<td style="padding:8px 12px; border:1px solid #ccc;">${displayVal}</td>`;
        }
        stepsHtml += `</tr>`;
      }
      stepsHtml += `<\/table></div></div>`;
    }
    stepsHtml += `<div class="rank-badge"><i class="fas fa-trophy"></i> Rank of Matrix = ${rank}</div>`;
    return stepsHtml;
  }

  // ------------- PRE-TEST QUESTIONS (11th/12th Basic Matrix Concepts) -------------
  const preTestQuestions = [
    { text: "What is a matrix?", options: ["A set of numbers arranged in rows and columns", "A single number", "A type of equation", "A vector only"], correct: 0 },
    { text: "What is the order of a matrix with 3 rows and 4 columns?", options: ["3×4", "4×3", "3×3", "4×4"], correct: 0 },
    { text: "Which of the following is a square matrix?", options: ["2×3", "3×2", "3×3", "1×4"], correct: 2 },
    { text: "What is a diagonal matrix?", options: ["All entries zero", "Only diagonal entries non-zero", "All entries equal", "Only upper triangular non-zero"], correct: 1 },
    { text: "What is the transpose of a matrix?", options: ["Swap rows and columns", "Multiply by itself", "Add to identity", "Take determinant"], correct: 0 },
    { text: "What is an identity matrix?", options: ["All entries 1", "Diagonal entries 1, rest 0", "All entries 0", "Diagonal entries 0, rest 1"], correct: 1 },
    { text: "Matrix addition is possible when:", options: ["Both matrices have same order", "One is square", "One is rectangular", "Always possible"], correct: 0 },
    { text: "What is a scalar multiplication?", options: ["Multiply each element by a number", "Multiply two matrices", "Add constant to diagonal", "Find determinant"], correct: 0 },
    { text: "What is a null matrix?", options: ["All entries zero", "All entries one", "Matrix with rank 1", "Identity matrix"], correct: 0 },
    { text: "What is the determinant of a 2×2 matrix [[a,b],[c,d]]?", options: ["ad+bc", "ad-bc", "ab-cd", "ac-bd"], correct: 1 }
  ];

  function renderPreTest() {
    let questionsHtml = '';
    preTestQuestions.forEach((q, idx) => {
      const selectedVal = preTestAnswers[`pre_q${idx}`] !== undefined ? preTestAnswers[`pre_q${idx}`] : -1;
      questionsHtml += `
        <div class="quiz-question" data-qidx="${idx}">
          <p>${idx+1}. ${q.text}</p>
          <div class="quiz-options">
            ${q.options.map((opt, optIdx) => `
              <label style="${preTestSubmitted ? (optIdx === q.correct ? 'background:#d4edda; border-left:6px solid #28a745;' : (preTestAnswers[`pre_q${idx}`] === optIdx && preTestAnswers[`pre_q${idx}`] !== q.correct ? 'background:#f8d7da; border-left:6px solid #dc3545;' : '')) : ''}">
                <input type="radio" name="pre_q${idx}" value="${optIdx}" ${preTestSubmitted ? 'disabled' : ''} ${(!preTestSubmitted && preTestAnswers[`pre_q${idx}`] === optIdx) ? 'checked' : ''}>
                ${opt}
              </label>
            `).join('')}
          </div>
          ${preTestSubmitted ? `<div class="${preTestAnswers[`pre_q${idx}`] === q.correct ? 'feedback-correct' : 'feedback-wrong'}" style="margin-top:8px;"><i class="fas ${preTestAnswers[`pre_q${idx}`] === q.correct ? 'fa-check-circle' : 'fa-times-circle'}"></i> ${preTestAnswers[`pre_q${idx}`] === q.correct ? 'Correct!' : `Wrong. Correct: ${q.options[q.correct]}`}</div>` : ''}
        </div>
      `;
    });
    const scorePercent = preTestSubmitted ? ((preTestScore / preTestQuestions.length) * 100).toFixed(1) : '0';
    return `
      <div class="page-header">
        <h1><i class="fas fa-file-alt"></i> Pre-Test: Basic Matrix Concepts</h1>
        <div>Test your foundational knowledge (11th/12th standard level) before proceeding to the virtual lab.</div>
      </div>
      <div class="section-card quiz-container">
        <div class="section-title"><i class="fas fa-graduation-cap"></i> Basic Matrix Assessment (10 Questions)</div>
        <div class="quiz-stats">
          <div class="stat-card"><i class="fas fa-chart-line"></i> ${preTestSubmitted ? `Score: ${preTestScore}/${preTestQuestions.length} (${scorePercent}%)` : "Answer all questions and submit"}</div>
          <div style="flex:1; min-width:180px;"><canvas id="preTestChart" width="200" height="150" style="max-height:150px; width:100%;"></canvas></div>
        </div>
        <form id="preTestForm">
          ${questionsHtml}
        </form>
        <div class="quiz-actions" style="justify-content: center; margin-top: 30px;">
          ${!preTestSubmitted ? `<button type="button" id="submitPreTestBtn" class="calc-btn" style="padding:12px 32px;"><i class="fas fa-paper-plane"></i> Submit Pre-Test</button>` : `<button type="button" id="resetPreTestBtn"><i class="fas fa-undo-alt"></i> Retake Pre-Test</button>`}
        </div>
      </div>
    `;
  }

  function computePreTestScore() {
    let correctCount = 0;
    for (let i = 0; i < preTestQuestions.length; i++) {
      const userAns = preTestAnswers[`pre_q${i}`];
      if (userAns !== undefined && userAns === preTestQuestions[i].correct) correctCount++;
    }
    preTestScore = correctCount;
    preTestSubmitted = true;
    renderCurrentSection();
    attachPreTestEvents();
    drawPreTestChart();
  }

  function drawPreTestChart() {
    const canvas = document.getElementById('preTestChart');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const correctPercent = (preTestScore / preTestQuestions.length) * 100;
    const wrongPercent = 100 - correctPercent;
    if (preTestChart) preTestChart.destroy();
    preTestChart = new Chart(ctx, {
      type: 'doughnut',
      data: { labels: [`Correct (${preTestScore})`, `Incorrect (${preTestQuestions.length - preTestScore})`], datasets: [{ data: [correctPercent, wrongPercent], backgroundColor: ['#28a745', '#dc3545'], borderWidth: 0 }] },
      options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { position: 'bottom' } } }
    });
  }

  function attachPreTestEvents() {
    if (!preTestSubmitted) {
      const radios = document.querySelectorAll('#preTestForm input[type="radio"]');
      radios.forEach(radio => {
        radio.removeEventListener('change', handlePreTestChange);
        radio.addEventListener('change', handlePreTestChange);
      });
      const submitBtn = document.getElementById('submitPreTestBtn');
      if (submitBtn) submitBtn.addEventListener('click', () => {

  function renderTutorial() {
    return `<div class="page-header"><h1><i class="fas fa-chalkboard-teacher"></i> Tutorial: How Row Echelon Form & Rank Work</h1></div>
    <div class="section-card">
      <div class="section-title"><i class="fas fa-graduation-cap"></i> Step-by-Step Concept</div>
      <div class="tutorial-step"><h3><i class="fas fa-1-circle" style="color:#FFB347;"></i> 1. What is Rank?</h3><p>The rank of a matrix is the maximum number of linearly independent rows (or columns). It tells us the dimension of the vector space spanned by its rows. In practical terms, it reveals how many rows carry unique information.</p><div class="highlight"><i class="fas fa-lightbulb"></i> Key idea: Rank = number of non-zero rows after Gaussian elimination (row echelon form).</div></div>
      <div class="tutorial-step"><h3><i class="fas fa-2-circle" style="color:#FFB347;"></i> 2. Elementary Row Operations</h3><p>We use three valid row operations that preserve rank: <strong>Swap</strong> two rows, <strong>Multiply</strong> a row by a non-zero scalar, and <strong>Add</strong> a multiple of one row to another. These help create zeros below pivots.</p><div class="demo-matrix">Example: R₂ → R₂ - 2R₁ creates a zero in first column.</div></div>
      <div class="tutorial-step"><h3><i class="fas fa-3-circle" style="color:#FFB347;"></i> 3. Forming Row Echelon Form (REF)</h3><p>REF requires: (a) All zero rows at bottom, (b) Leading entry (pivot) in each row is strictly to the right of pivot above, (c) All entries below pivot are zero. Our algorithm automatically does this using Gaussian elimination.</p><div class="demo-matrix">⎡ 1  2  3 ⎤<br>⎢ 0  1  4 ⎥  →  two pivots ⇒ rank = 2<br>⎣ 0  0  0 ⎦</div></div>
      <div class="tutorial-step"><h3><i class="fas fa-4-circle" style="color:#FFB347;"></i> 4. How the Virtual Lab works</h3><p>You input any matrix (max 5x5). The solver performs sequential row operations, showing each transformation. At the end, non-zero rows count = rank. The step-by-step display enhances understanding of pivot positions.</p><p><strong>Pro tip:</strong> Try a singular matrix (determinant zero) and see rank less than full dimension!</p></div>
      <div class="tutorial-step"><h3><i class="fas fa-5-circle" style="color:#FFB347;"></i> 5. Why Rank matters?</h3><p>Rank determines solution existence (Consistency of Ax=b), dimensionality reduction (PCA, SVD), controllability in robotics, and even image compression. Mastering rank builds a strong foundation for advanced engineering maths.</p></div>
    </div>`;

  // Applications with FULL original detailed content
  const applicationsDB = {
    "image": { title: "Image Processing & Compression", icon: "fas fa-image", detail: "Matrix rank plays a vital role in image compression using Singular Value Decomposition (SVD). A grayscale image is represented as a matrix where each entry is a pixel intensity. Using SVD (A = UΣVᵀ), we can approximate the image using only the top 'k' singular values, where 'k' is the rank of the approximation. Low-rank approximation discards insignificant singular values (noise), reducing storage space by 80-90% while preserving essential features like edges and shapes.", extended: `<ul style="margin-top: 12px; margin-left: 20px;"><li><strong>🔬 Deep Dive:</strong> If an image matrix A has rank r, we can write A ≈ A_k = U_k Σ_k V_kᵀ, where k < r. This is the foundation of JPEG 2000 compression.</li><li><strong>📊 Real-world example:</strong> A 1024×1024 satellite image (1 million pixels) with rank 50 can be stored using only 1024×50 + 50 + 50×1024 ≈ 102,500 numbers — over 90% compression!</li><li><strong>🧠 Learning insight:</strong> The lower the rank, the more compressible the image. Smooth images have low rank; textured/noisy images have high rank.</li><li><strong>⚙️ Applications:</strong> Facial recognition (Eigenfaces), MRI reconstruction, video streaming, document scanning.</li></ul>` },
    "control": { title: "Control Theory & Robotics", icon: "fas fa-robot", detail: "In state-space control systems, the rank of the controllability matrix (C = [B AB A²B ... Aⁿ⁻¹B]) determines whether a system can be driven from any initial state to any desired final state using control inputs. Similarly, the observability matrix rank determines if internal states can be inferred from output measurements.", extended: `<ul style="margin-top: 12px; margin-left: 20px;"><li><strong>🔬 Deep Dive:</strong> A linear system is <strong>controllable</strong> if rank(C) = n (system order). It is <strong>observable</strong> if rank(O) = n, where O = [C CA CA² ... CAⁿ⁻¹]ᵀ.</li><li><strong>📊 Real-world example:</strong> For an autonomous car, the controllability rank ensures steering and throttle can guide the car to any position; observability rank ensures sensors (cameras, LIDAR) can estimate the car's true state.</li><li><strong>🧠 Learning insight:</strong> Rank deficiency in controllability means some 'modes' of the system cannot be influenced — a critical safety issue in drones, rockets, and industrial robots.</li><li><strong>⚙️ Applications:</strong> Pole placement design, Kalman filters, autopilot systems, chemical process control.</li></ul>` },
    "equations": { title: "System of Linear Equations", icon: "fas fa-chart-line", detail: "The Rouché–Capelli theorem states: A system Ax = b has solutions if and only if rank(A) = rank([A|b]). If rank(A) = rank([A|b]) = number of variables → unique solution. If rank(A) = rank([A|b]) < variables → infinitely many solutions. If ranks differ → no solution (inconsistent system).", extended: `<ul style="margin-top: 12px; margin-left: 20px;"><li><strong>🔬 Deep Dive:</strong> The nullity (dimension of null space) = n - rank(A). This tells how many free variables exist in the solution.</li><li><strong>📊 Real-world example:</strong> In electrical circuit analysis (Kirchhoff's laws), you get 10 equations in 10 unknowns. If rank(A) = 9, then infinite solutions exist — meaning the circuit has a redundancy (e.g., a loop with no voltage source).</li><li><strong>🧠 Learning insight:</strong> Rank reveals whether your equations are independent or if some are just linear combinations of others (redundant information).</li><li><strong>⚙️ Applications:</strong> Structural engineering (force equilibrium), economic input-output models, network flow optimization, machine learning regression.</li></ul>` },
    "pca": { title: "Principal Component Analysis (PCA) & Data Science", icon: "fas fa-chart-scatter", detail: "PCA transforms data to a new coordinate system where the greatest variance lies on the first principal component. The rank of the covariance matrix reveals the intrinsic dimensionality of the dataset. By projecting onto the top-k eigenvectors (where k equals the effective rank), we reduce dimensions while preserving 95%+ of information.", extended: `<ul style="margin-top: 12px; margin-left: 20px;"><li><strong>🔬 Deep Dive:</strong> If data matrix X (m samples × n features) has rank r, then the covariance matrix XᵀX also has rank r. PCA keeps the eigenvectors corresponding to the largest r' singular values (r' ≤ r).</li><li><strong>📊 Real-world example:</strong> In face recognition (Eigenfaces), a 1024-pixel face can be represented by just 50-100 principal components — reducing dimensions by 90% while maintaining 95% recognition accuracy.</li><li><strong>🧠 Learning insight:</strong> The 'elbow' in the scree plot (plot of singular values) shows the effective rank — where additional components add little new variance.</li><li><strong>⚙️ Applications:</strong> Genetics (finding gene expression patterns), finance (portfolio risk factors), recommendation systems (Netflix, Amazon), anomaly detection.</li></ul>` }
  };

  }

  // AIM with original detailed content
  function renderAim() {
    return `<div class="page-header"><h1>PCCOE Pune</h1></div>
    <div class="section-card">
      <div class="section-title"><i class="fas fa-crosshairs"></i> Aim</div>
      <p style="font-size:1.1rem;">The primary objective of this experiment is to systematically determine the <b>Rank of a Matrix</b> by performing elementary row transformations to reduce it to its <b>Row Echelon Form</b>. This virtual simulation provides a rigorous platform for analyzing linear independence among row vectors, identifying pivot elements, and calculating the final rank based on the number of non-zero rows. By mastering this process, students develop the foundational skills required to evaluate the consistency of linear systems (AX = B) and understand the dimensionality of vector spaces in complex engineering problems.</p>
    </div>`;
  }

  function renderCurrentSection() {
    if (currentSection === 'aim') mainContainer.innerHTML = renderAim();
    else if (currentSection === 'tutorial') mainContainer.innerHTML = renderTutorial();
    else if (currentSection === 'pre-test') { mainContainer.innerHTML = renderPreTest(); attachPreTestEvents(); if(preTestSubmitted) drawPreTestChart(); }
    else if (currentSection === 'virtual-lab') { mainContainer.innerHTML = renderVirtualLab(); attachLabEvents(); if(lastComputedSteps) setTimeout(() => updateStepsVisibilityLab(), 20); }
    else if (currentSection === 'applications') { if (currentSubview === 'detail' && selectedApp) mainContainer.innerHTML = renderApplicationDetail(selectedApp); else { currentSubview = 'list'; mainContainer.innerHTML = renderApplicationsList(); } bindApplicationCards(); }
    else if (currentSection === 'quiz') { mainContainer.innerHTML = renderQuiz(); attachQuizEvents(); if(quizSubmitted) drawAccuracyChart(); }
    else if (currentSection === 'feedback') { mainContainer.innerHTML = renderFeedback(); attachFeedbackEvents(); }
    else if (currentSection === 'credits') mainContainer.innerHTML = renderCredits();
    document.querySelectorAll('.nav-btn').forEach(btn => { const s = btn.getAttribute('data-section'); if(s === currentSection) btn.classList.add('active'); else btn.classList.remove('active'); });
  }

  function bindNavigation() {
    document.querySelectorAll('.nav-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        const section = btn.getAttribute('data-section');
        if (['aim','tutorial','pre-test','virtual-lab','applications','quiz','feedback','credits'].includes(section)) {
          currentSection = section;
          if (section !== 'applications') { currentSubview = null; selectedApp = null; }
          else if (!currentSubview) currentSubview = 'list';
          renderCurrentSection();
        }
      });
    });
  }
  function init() { bindNavigation(); renderCurrentSection(); }
  init();
</script>
</body>
</html>
